<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="utf-8">
    <title>La Cèl·lula 3D - Carles Fdez.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

    <a-scene webxr="optionalFeatures: google-local-floor; referenceSpaceType: local-floor">
        
        <a-sky color="#a0c4ff"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#cbd5e1"></a-plane>
        <a-light type="ambient" color="#ffffff" intensity="0.9"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.6" position="-1 3 1.5"></a-light>

        <a-entity id="rig">
            <a-camera id="camera" position="0 1.6 0" look-controls>
                <a-cursor id="cursor-visual"
                          animation__click="property: scale; startEvents: click; easing: easeInCubic; durability: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                          animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; durability: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                          raycaster="objects: .interactiva"
                          material="color: black; shader: flat"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03">
                </a-cursor>
            </a-camera>
            <a-entity laser-controls="hand: left" raycaster="objects: .interactiva" line="color: #1abc9c"></a-entity>
            <a-entity laser-controls="hand: right" raycaster="objects: .interactiva" line="color: #1abc9c"></a-entity>
        </a-entity>

        <a-entity id="credits-on-floor" position="0 0.01 -0.7" rotation="-90 0 0">
            <a-text value="LA CELLULA EN 3D" align="center" color="#16a085" width="2.2" bold="true"></a-text>
            <a-text value="idea: Carles Fdez." align="center" color="#1e293b" width="1.6" position="0 -0.15 0"></a-text>
        </a-entity>

        <a-box id="btn-reiniciar" class="interactiva" position="-0.6 0.05 -0.7" width="0.2" height="0.1" depth="0.2" color="#dc2626">
            <a-text value="REINICIAR" align="center" color="#ffffff" width="1.2" position="0 0.06 0" rotation="-90 0 0"></a-text>
        </a-box>

        <a-box position="0 0.05 -1.6" width="2.2" height="0.1" depth="1.3" color="#475569"></a-box>
        
        <a-cylinder id="base-celula" position="0 0.11 -1.6" radius="0.4" height="0.02" color="#f1f5f9">
            <a-text value="Citoplasma" align="center" color="#94a3b8" width="1.5" rotation="-90 0 0" position="0 0.01 0"></a-text>
        </a-cylinder>


        <a-entity id="grupo-nucleo" class="interactiva" position="-0.5 0.2 -1.2" arrastrable>
            <a-sphere radius="0.07" color="#ef4444"></a-sphere>
            <a-plane position="0 0.12 0" width="0.2" height="0.06" color="#1e293b">
                <a-text value="Nucli" align="center" color="#ffffff" width="1"></a-text>
            </a-plane>
        </a-entity>

        <a-entity id="grupo-cloroplast" class="interactiva" position="0.5 0.2 -1.2" arrastrable>
            <a-cylinder radius="0.03" height="0.1" color="#22c55e" rotation="45 0 0"></a-cylinder>
            <a-plane position="0 0.12 0" width="0.27" height="0.06" color="#1e293b">
                <a-text value="Cloroplast" align="center" color="#ffffff" width="1"></a-text>
            </a-plane>
        </a-entity>

        <a-entity id="grupo-mitocondria" class="interactiva" position="-0.7 0.2 -1.5" arrastrable>
            <a-sphere radius="0.04" color="#f97316" scale="1 1 2"></a-sphere>
            <a-plane position="0 0.12 0" width="0.3" height="0.06" color="#1e293b">
                <a-text value="Mitocondria" align="center" color="#ffffff" width="1"></a-text>
            </a-plane>
        </a-entity>

        <a-entity id="grupo-vacuola" class="interactiva" position="0.7 0.2 -1.5" arrastrable>
            <a-box width="0.12" height="0.12" depth="0.12" color="#38bdf8"></a-box>
            <a-plane position="0 0.12 0" width="0.22" height="0.06" color="#1e293b">
                <a-text value="Vacuola" align="center" color="#ffffff" width="1"></a-text>
            </a-plane>
        </a-entity>

        <a-entity id="grupo-membrana" class="interactiva" position="-0.3 0.2 -1.9" arrastrable>
            <a-ring radius-inner="0.07" radius-outer="0.09" color="#1e3a8a" rotation="-90 0 0"></a-ring>
            <a-plane position="0 0.12 0" width="0.32" height="0.06" color="#1e293b">
                <a-text value="Membrana" align="center" color="#ffffff" width="1"></a-text>
            </a-plane>
        </a-entity>

        <a-entity id="grupo-paret" class="interactiva" position="0.3 0.2 -1.9" arrastrable>
            <a-cylinder segments-radial="6" radius="0.09" height="0.02" color="#78350f" rotation="0 0 0"></a-cylinder>
            <a-plane position="0 0.12 0" width="0.22" height="0.06" color="#1e293b">
                <a-text value="Paret" align="center" color="#ffffff" width="1"></a-text>
            </a-plane>
        </a-entity>

    </a-scene>

    <script>
        // Posiciones iniciales de fábrica para poder reiniciar el puzle
        const posIniciales = {
            "grupo-nucleo": {x: -0.3, y: 0.2, z: -1.2},
            "grupo-cloroplast": {x: 0.3, y: 0.2, z: -1.2},
            "grupo-mitocondria": {x: -0.6, y: 0.2, z: -1.5},
            "grupo-vacuola": {x: 0.6, y: 0.2, z: -1.5},
            "grupo-membrana": {x: -0.3, y: 0.2, z: -1.9},
            "grupo-paret": {x: 0.3, y: 0.2, z: -1.9}
        };

        AFRAME.registerComponent('arrastrable', {
            init: function () {
                var el = this.el;
                
                // Animación de selección
                el.addEventListener('mouseenter', function () { el.setAttribute('scale', '1.1 1.1 1.1'); });
                el.addEventListener('mouseleave', function () { el.setAttribute('scale', '1 1 1'); });

                // Al hacer click/gatillo: viaja al Citoplasma central
                el.addEventListener('click', function () {
                    var base = document.querySelector('#base-celula').getAttribute('position');
                    var tx = base.x, tz = base.z;
                    
                    // Coordenadas organizadas dentro de la célula para que no se pisen
                    if(el.id === "grupo-nucleo") { tx += 0; tz += 0; }
                    else if(el.id === "grupo-cloroplast") { tx += 0.15; tz -= 0.1; }
                    else if(el.id === "grupo-mitocondria") { tx -= 0.15; tz -= 0.1; }
                    else if(el.id === "grupo-vacuola") { tx += 0.12; tz += 0.1; }
                    else if(el.id === "grupo-membrana") { tx -= 0.15; tz += 0.1; }
                    else if(el.id === "grupo-paret") { tx += 0; tz -= 0.18; }
                    
                    el.setAttribute('position', {x: tx, y: base.y + 0.04, z: tz});
                });
            }
        });

        // LÓGICA DEL BOTÓN REINICIAR
        document.querySelector('#btn-reiniciar').addEventListener('click', function() {
            Object.keys(posIniciales).forEach(function(id) {
                var elemento = document.getElementById(id);
                if (elemento) {
                    elemento.setAttribute('position', posIniciales[id]);
                }
            });
        });
    </script>
</body>
</html>
