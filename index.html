<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="utf-8">
    <title>La Cèl·lula 3D - Carles Fdez.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

    <a-scene webxr="optionalFeatures: google-local-floor; referenceSpaceType: local-floor">
        
        <a-sky color="#a0c4ff"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#cbd5e1"></a-plane>
        <a-light type="ambient" color="#ffffff" intensity="0.9"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.6" position="-1 3 1.5"></a-light>

        <a-entity id="rig">
            <a-camera id="camera" position="0 1.6 0" look-controls>
                <a-cursor id="cursor-visual"
                          animation__click="property: scale; startEvents: click; easing: easeInCubic; durability: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                          animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; durability: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                          raycaster="objects: .interactiva"
                          material="color: black; shader: flat"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03">
                </a-cursor>
            </a-camera>
            <a-entity laser-controls="hand: left" raycaster="objects: .interactiva" line="color: #1abc9c"></a-entity>
            <a-entity laser-controls="hand: right" raycaster="objects: .interactiva" line="color: #1abc9c"></a-entity>
        </a-entity>

        <a-entity id="credits-on-floor" position="0 0.01 -0.6" rotation="-90 0 0">
            <a-text value="LA CEL.LULA EN 3D" align="center" color="#16a085" width="2" bold="true"></a-text>
            <a-text value="idea: Carles Fdez." align="center" color="#1e293b" width="1.5" position="0 -0.15 0"></a-text>
        </a-entity>

        <a-box id="btn-reiniciar" class="interactiva" position="-0.6 0.05 -0.6" width="0.2" height="0.1" depth="0.2" color="#dc2626">
            <a-text value="REINICIAR" align="center" color="#ffffff" width="1.2" position="0 0.06 0" rotation="-90 0 0"></a-text>
        </a-box>

        <a-box position="0 0.05 -1.5" width="2.2" height="0.1" depth="1.3" color="#475569"></a-box>
        
        <a-cylinder id="base-celula" position="0 0.11 -1.5" radius="0.35" height="0.02" color="#f1f5f9">
            <a-text value="Citoplasma" align="center" color="#94a3b8" width="1.5" rotation="-90 0 0" position="0 0.01 0"></a-text>
        </a-cylinder>


        <a-sphere id="obj-nucli" class="interactiva" position="-0.4 0.15 -1.2" radius="0.07" color="#ef4444" arrastrable>
            <a-text value="Nucli" align="center" color="#1e293b" width="1.2" position="0 0.13 0" rotation="-45 0 0"></a-text>
        </a-sphere>

        <a-cylinder id="obj-cloroplast" class="interactiva" position="0.4 0.15 -1.2" radius="0.03" height="0.1" color="#22c55e" rotation="45 0 0" arrastrable>
            <a-text value="Cloroplast" align="center" color="#1e293b" width="1.2" position="0 0.13 0" rotation="-45 0 0"></a-text>
        </a-cylinder>

        <a-sphere id="obj-mitocondri" class="interactiva" position="-0.6 0.15 -1.5" radius="0.04" color="#f97316" scale="1 1 1.8" arrastrable>
            <a-text value="Mitocondri" align="center" color="#1e293b" width="1.2" position="0 0.13 0" rotation="-45 0 0"></a-text>
        </a-sphere>

        <a-box id="obj-vacuola" class="interactiva" position="0.6 0.15 -1.5" width="0.12" height="0.12" depth="0.12" color="#38bdf8" arrastrable>
            <a-text value="Vacuola" align="center" color="#1e293b" width="1.2" position="0 0.13 0" rotation="-45 0 0"></a-text>
        </a-box>

        <a-ring id="obj-membrana" class="interactiva" position="-0.4 0.15 -1.8" radius-inner="0.06" radius-outer="0.08" color="#1e3a8a" rotation="-90 0 0" arrastrable>
            <a-text value="Membrana" align="center" color="#1e293b" width="1.2" position="0 0 0.1" rotation="45 0 0"></a-text>
        </a-ring>

        <a-cylinder id="obj-paret" class="interactiva" position="0.4 0.15 -1.8" segments-radial="6" radius="0.08" height="0.03" color="#78350f" arrastrable>
            <a-text value="Paret celular" align="center" color="#1e293b" width="1.2" position="0 0.13 0" rotation="-45 0 0"></a-text>
        </a-cylinder>

    </a-scene>

    <script>
        // Posicions originals exactes per a poder reiniciar
        const posicionsOriginals = {
            "obj-nucli": {x: -0.4, y: 0.15, z: -1.2},
            "obj-cloroplast": {x: 0.4, y: 0.15, z: -1.2},
            "obj-mitocondri": {x: -0.6, y: 0.15, z: -1.5},
            "obj-vacuola": {x: 0.6, y: 0.15, z: -1.5},
            "obj-membrana": {x: -0.4, y: 0.15, z: -1.8},
            "obj-paret": {x: 0.4, y: 0.15, z: -1.8}
        };

        // Lògica de moviment dels objectes cap al citoplasma
        HTMLCollection.prototype.forEach = Array.prototype.forEach;
        
        AFRAME.registerComponent('arrastrable', {
            init: function () {
                var el = this.el;
                
                // Animació subtil en apuntar
                el.addEventListener('mouseenter', function () { 
                    el.setAttribute('opacity', '0.7'); 
                });
                el.addEventListener('mouseleave', function () { 
                    el.setAttribute('opacity', '1.0'); 
                });

                // En fer clic (amb gatillo o mirada), l'objecte va a la seva coordenada del citoplasma
                el.addEventListener('click', function () {
                    var base = document.querySelector('#base-celula').getAttribute('position');
                    var tx = base.x, tz = base.z;
                    
                    // Distribució a sobre del citoplasma blanc perquè no col·lisionin
                    if(el.id === "obj-nucli") { tx += 0; tz += 0; }
                    else if(el.id === "obj-cloroplast") { tx += 0.15; tz -= 0.1; }
                    else if(el.id === "obj-mitocondri") { tx -= 0.15; tz -= 0.1; }
                    else if(el.id === "obj-vacuola") { tx += 0.12; tz += 0.1; }
                    else if(el.id === "obj-membrana") { tx -= 0.15; tz += 0.1; }
                    else if(el.id === "obj-paret") { tx += 0; tz -= 0.18; }
                    
                    el.setAttribute('position', {x: tx, y: base.y + 0.05, z: tz});
                });
            }
        });

        // ACCIÓ DEL BOTÓ REINICIAR (Torna tot al seu lloc d'origen)
        document.querySelector('#btn-reiniciar').addEventListener('click', function() {
            Object.keys(posicionsOriginals).forEach(function(id) {
                var target = document.getElementById(id);
                if (target) {
                    target.setAttribute('position', posicionsOriginals[id]);
                    // Si és la membrana, mantenim la rotació plana original
                    if(id === "obj-membrana") {
                        target.setAttribute('rotation', '-90 0 0');
                    } else if(id === "obj-cloroplast") {
                        target.setAttribute('rotation', '45 0 0');
                    } else {
                        target.setAttribute('rotation', '0 0 0');
                    }
                }
            });
        });
    </script>
</body>
</html>
