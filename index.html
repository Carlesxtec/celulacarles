<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>La Célula 3D - Carles Fdez.</title>
    <meta name="description" content="PWA WebXR interactiva para primaria">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#16a085">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>
</head>
<body>
    <a-scene webxr="optionalFeatures: google-local-floor;">
        
        <a-sky color="#a0c4ff"></a-sky> <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#e2e8f0"></a-plane>
        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.5" position="-1 4 2"></a-light>

        <a-entity id="rig" position="0 0 1.5">
            <a-camera id="camera" look-controls position="0 1.6 0"></a-camera>
            
            <a-entity sphere-collider="objects: .interactiva" super-hands hand-controls="hand: left"></a-entity>
            <a-entity sphere-collider="objects: .interactiva" super-hands hand-controls="hand: right"></a-entity>
        </a-entity>

        <a-entity position="0 2.2 -2.5">
            <a-text value="LA CELULA EN 3D" align="center" color="#16a085" width="5" font="default" bold="true"></a-text>
            <a-text value="idea: Carles Fdez." align="center" color="#2d3748" width="3.5" position="0 -0.4 0" font="default"></a-text>
        </a-entity>

        <a-box position="0 0.8 -2" width="2.2" height="0.1" depth="1.2" color="#4a5568"></a-box>
        <a-box position="0 0.4 -2" width="0.2" height="0.8" depth="0.2" color="#2d3748"></a-box>
        
        <a-cylinder position="0 0.86 -2" radius="0.4" height="0.02" color="#e2e8f0" opacity="0.8">
            <a-text value="Arrastra las partes aqui" align="center" color="#718096" width="2" rotation="-90 0 0" position="0 0.02 0"></a-text>
        </a-cylinder>

        <a-sphere position="-0.5 1 -1.7" radius="0.12" color="#e53e3e" 
                  hoverable grabbable stretchable
                  class="interactiva"
                  id="pieza-nucleo">
            <a-text value="Nucleo" align="center" color="#ffffff" width="1.5" position="0 0.18 0" look-at="#camera"></a-text>
        </a-sphere>

        <a-capsule position="0.5 1 -1.7" radius="0.06" length="0.1" color="#38a169" 
                   rotation="45 45 0"
                   hoverable grabbable stretchable
                   class="interactiva"
                   id="pieza-cloroplasto">
            <a-text value="Cloroplasto" align="center" color="#ffffff" width="1.5" position="0 0.2 0" look-at="#camera"></a-text>
        </a-capsule>

        <a-capsule position="0 1 -1.5" radius="0.05" length="0.08" color="#dd6b20" 
                   hoverable grabbable stretchable
                   class="interactiva"
                   id="pieza-mitocondria">
            <a-text value="Mitocondria" align="center" color="#ffffff" width="1.5" position="0 0.15 0" look-at="#camera"></a-text>
        </a-capsule>

    </a-scene>

    <script>
        // Registro del Service Worker para funcionamiento sin internet
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error:", err));
            });
        }
    </script>
</body>
</html>
