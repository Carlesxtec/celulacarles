<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>La Célula 3D - Carles Fdez.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#16a085">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    
    <style>
        /* Forzar que el botón de "Entrar en VR" sea visible en pantallas rebeldes */
        .a-enter-vr-button { background-color: #16a085 !important; }
    </style>
</head>
<body>
    <a-scene webxr="optionalFeatures: google-local-floor; referenceSpaceType: local-floor">
        
        <a-sky color="#a0c4ff"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#cbd5e1"></a-plane>
        <a-light type="ambient" color="#ffffff" intensity="0.9"></a-light>

        <a-entity id="rig" position="0 0 0">
            <a-camera id="camera" look-controls position="0 1.6 0"></a-camera>
            
            <a-entity laser-controls="hand: left" raycaster="objects: .interactiva; far: 5" line="color: #1abc9c; opacity: 0.75"></a-entity>
            <a-entity laser-controls="hand: right" raycaster="objects: .interactiva; far: 5" line="color: #1abc9c; opacity: 0.75"></a-entity>
        </a-entity>

        <a-entity position="0 2.2 -2">
            <a-text value="LA CELULA EN 3D" align="center" color="#16a085" width="4" font="default" bold="true"></a-text>
            <a-text value="idea: Carles Fdez." align="center" color="#1e293b" width="3" position="0 -0.35 0" font="default"></a-text>
        </a-entity>

        <a-box position="0 0.8 -1.5" width="1.6" height="0.1" depth="1" color="#475569"></a-box>
        
        <a-cylinder id="base-celula" position="0 0.86 -1.5" radius="0.3" height="0.02" color="#f1f5f9">
            <a-text value="Suelte aqui" align="center" color="#475569" width="1.5" rotation="-90 0 0" position="0 0.02 0"></a-text>
        </a-cylinder>

        <a-sphere class="interactiva" id="nucleo" position="-0.4 1 -1.3" radius="0.1" color="#ef4444" arrastrable>
            <a-text value="Nucleo" align="center" color="#ffffff" width="1.2" position="0 0.15 0"></a-text>
        </a-sphere>

        <a-cylinder class="interactiva" id="cloroplasto" position="0.4 1 -1.3" radius="0.05" height="0.15" color="#22c55e" rotation="45 0 45" arrastrable>
            <a-text value="Cloroplasto" align="center" color="#ffffff" width="1.2" position="0 0.15 0"></a-text>
        </a-cylinder>

    </a-scene>

    <script>
        AFRAME.registerComponent('arrastrable', {
            init: function () {
                var el = this.el;
                
                // Al apuntar al objeto con el mando
                el.addEventListener('mouseenter', function () {
                    el.setAttribute('material', 'opacity', 0.7);
                });
                
                // Al quitar el puntero
                el.addEventListener('mouseleave', function () {
                    el.setAttribute('material', 'opacity', 1.0);
                });

                // Al pulsar el gatillo del mando YVR (Click)
                el.addEventListener('click', function (evt) {
                    // Lógica simple para primaria: Si haces click, viaja automáticamente a la base
                    var base = document.querySelector('#base-celula').getAttribute('position');
                    
                    // Colocar orgánulo en la célula con una pequeña variación para que no se pisen
                    if(el.id === "nucleo") {
                        el.setAttribute('position', {x: base.x, y: base.y + 0.05, z: base.z});
                    } else if(el.id === "cloroplasto") {
                        el.setAttribute('position', {x: base.x + 0.15, y: base.y + 0.05, z: base.z - 0.05});
                    }
                });
            }
        });
    </script>
</body>
</html>
