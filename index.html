<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="utf-8">
    <title>La Cèl·lula 3D - Carles Fdez.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

    <a-scene webxr="optionalFeatures: google-local-floor; referenceSpaceType: local-floor">
        
        <a-assets>
            <img id="imatge-final" src="celula.jpg">
        </a-assets>

        <a-sky color="#0f172a"></a-sky> 
        <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#1e293b"></a-plane>
        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" color="#38bdf8" intensity="0.8" position="1 4 1"></a-light>

        <a-entity id="rig">
            <a-camera id="camera" look-controls position="0 1.6 0">
                <a-cursor id="cursor-visual"
                          raycaster="interval: 50"
                          material="color: #38bdf8; shader: flat"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                          cursor="fuse: false">
                </a-cursor>
            </a-camera>
        </a-entity>

        <a-entity id="credits-on-floor" position="0 0.01 -0.6" rotation="-90 0 0">
            <a-text value="LA CEL.LULA EN 3D" font="roboto" align="center" color="#38bdf8" width="2" bold="true"></a-text>
            <a-text value="idea: Carles Fdez." font="roboto" align="center" color="#94a3b8" width="1.4" position="0 -0.15 0"></a-text>
        </a-entity>

        <a-box id="btn-reiniciar" position="-0.7 0.05 -0.6" width="0.25" height="0.1" depth="0.2" color="#dc2626" dades-peça>
            <a-text value="REINICIAR" font="roboto" align="center" color="#ffffff" width="1.2" position="0 0.06 0" rotation="-90 0 0" bold="true"></a-text>
        </a-box>

        <a-box position="0 0.05 -1.5" width="2.4" height="0.1" depth="1.4" color="#475569"></a-box>
        
        <a-torus id="base-membrana" position="0 0.11 -1.5" radius="0.38" radius-tubular="0.015" color="#0284c7" rotation="90 0 0">
            <a-cylinder id="base-celula" position="0 0 0" radius="0.37" height="0.01" color="#0ea5e9" opacity="0.3">
                <a-text value="Citoplasma" font="roboto" align="center" color="#ffffff" width="1.5" rotation="-90 0 0" position="0 0.01 0" opacity="0.6"></a-text>
            </a-cylinder>
        </a-torus>

        <a-entity id="pantalla-final" position="0 1.5 -2.5" visible="false" imatge-zoomable>
            <a-image src="#imatge-final" width="3" height="1.7" id="quadre-imatge"></a-image>
            <a-text value="CEL.LULA COMPLETADA AMB EXIT!" font="roboto" align="center" color="#4ade80" width="3" position="0 1 0.1" bold="true"></a-text>
        </a-entity>


        <a-entity id="obj-nucli" position="-0.4 0.15 -1.1" dades-peça>
            <a-sphere radius="0.06" color="#f43f5e"></a-sphere>
            <a-text value="Nucli" font="roboto" align="center" color="#ffffff" width="1.2" position="0 0.1 0" rotation="-45 0 0"></a-text>
        </a-entity>

        <a-entity id="obj-cloroplast" position="0.4 0.15 -1.1" rotation="20 30 0" dades-peça>
            <a-cone radius-bottom="0.05" radius-top="0.03" height="0.05" color="#16a34a"></a-cone>
            <a-text value="Cloroplast" font="roboto" align="center" color="#ffffff" width="1.2" position="0 0.1 0" rotation="-45 0 0"></a-text>
        </a-entity>

        <a-entity id="obj-mitocondri" position="-0.6 0.15 -1.4" dades-peça>
            <a-sphere radius="0.03" color="#f97316" scale="1 1 2"></a-sphere>
            <a-text value="Mitocondri" font="roboto" align="center" color="#ffffff" width="1.2" position="0 0.1 0" rotation="-45 0 0"></a-text>
        </a-entity>

        <a-entity id="obj-vacuola" position="0.6 0.15 -1.4" dades-peça>
            <a-sphere radius="0.06" color="#38bdf8" scale="1.3 0.8 1" material="opacity: 0.7"></a-sphere>
            <a-text value="Vacuola" font="roboto" align="center" color="#ffffff" width="1.2" position="0 0.1 0" rotation="-45 0 0"></a-text>
        </a-entity>

        <a-entity id="obj-membrana" position="-0.4 0.15 -1.7" dades-peça>
            <a-ring radius-inner="0.05" radius-outer="0.07" color="#1e3a8a" rotation="-90 0 0"></a-ring>
            <a-text value="Membrana cel.lular" font="roboto" align="center" color="#ffffff" width="1.1" position="0 0.1 0" rotation="-45 0 0"></a-text>
        </a-entity>

        <a-entity id="obj-paret" position="0.4 0.15 -1.7" dades-peça>
            <a-cylinder segments-radial="6" radius="0.07" height="0.05" color="#78350f" material="openEnded: true; side: double"></a-cylinder>
            <a-text value="Paret cel.lular" font="roboto" align="center" color="#ffffff" width="1.1" position="0 0.1 0" rotation="-45 0 0"></a-text>
        </a-entity>

    </a-scene>

    <script>
        const posicionsOriginals = {
            "obj-nucli": {x: -0.4, y: 0.15, z: -1.1},
            "obj-cloroplast": {x: 0.4, y: 0.15, z: -1.1},
            "obj-mitocondri": {x: -0.6, y: 0.15, z: -1.4},
            "obj-vacuola": {x: 0.6, y: 0.15, z: -1.4},
            "obj-membrana": {x: -0.4, y: 0.15, z: -1.7},
            "obj-paret": {x: 0.4, y: 0.15, z: -1.7}
        };

        let pecesColocades = 0;
        var objecteEnfocat = null;

        // Gestió de les peces del trencaclosques
        AFRAME.registerComponent('dades-peça', {
            init: function () {
                var el = this.el;
                el.addEventListener('mouseenter', function () {
                    objecteEnfocat = el;
                    el.setAttribute('scale', '1.2 1.2 1.2');
                });
                el.addEventListener('mouseleave', function () {
                    if (objecteEnfocat === el) objecteEnfocat = null;
                    if (el.getAttribute('position').z !== -1.5) {
                        el.setAttribute('scale', '1 1 1');
                    }
                });
            }
        });

        // COMPONENT NOU: Si l'alumne mira la imatge final amb el cap, aquesta s'apropa i creix
        AFRAME.registerComponent('imatge-zoomable', {
            init: function () {
                var el = this.el;
                
                el.addEventListener('mouseenter', function () {
                    // S'apropa a la càmera (passa de z: -2.5 a z: -1.8) i es fa una mica més gran
                    el.setAttribute('position', '0 1.5 -1.8');
                    el.setAttribute('scale', '1.1 1.1 1.1');
                });

                el.addEventListener('mouseleave', function () {
                    // Torna a la seva posició de repòs en treure la mirada
                    el.setAttribute('position', '0 1.5 -2.5');
                    el.setAttribute('scale', '1 1 1');
                });
            }
        });

        function mourePeça(el) {
            if (!el) return;

            // REINICIAR
            if (el.id === "btn-reiniciar") {
                pecesColocades = 0;
                var pantalla = document.getElementById('pantalla-final');
                pantalla.setAttribute('visible', false);
                pantalla.setAttribute('position', '0 1.5 -2.5');
                pantalla.setAttribute('scale', '1 1 1');

                Object.keys(posicionsOriginals).forEach(function(id) {
                    var target = document.getElementById(id);
                    if (target) {
                        target.setAttribute('position', posicionsOriginals[id]);
                        target.setAttribute('scale', '1 1 1');
                        target.setAttribute('visible', true);
                    }
                });
                return;
            }

            if (el.getAttribute('position').z === -1.5) return;

            var tx = 0, tz = -1.5, ty = 0.13;
            if(el.id === "obj-nucli") { tx = 0; tz = -1.5; ty = 0.15; }
            else if(el.id === "obj-vacuola") { tx = 0.16; tz = -1.55; }
            else if(el.id === "obj-cloroplast") { tx = 0.14; tz = -1.40; }
            else if(el.id === "obj-mitocondri") { tx = -0.16; tz = -1.55; }
            else if(el.id === "obj-membrana") { tx = -0.14; tz = -1.40; }
            else if(el.id === "obj-paret") { 
                tx = 0; tz = -1.5; ty = 0.12;
                el.setAttribute('scale', '5.4 1 5.4'); 
            }
            
            el.setAttribute('position', {x: tx, y: ty, z: tz});
            pecesColocades++;

            // FINALITZACIÓ DEL JOC
            if (pecesColocades >= 6) {
                setTimeout(function() {
                    Object.keys(posicionsOriginals).forEach(function(id) {
                        document.getElementById(id).setAttribute('visible', false);
                    });
                    // Mostra la pantalla final amb la imatge real
                    document.getElementById('pantalla-final').setAttribute('visible', true);
                }, 500);
            }
        }

        // ESCOLTADORS DE CONTROL PER AL GATELL DE LES PVR
        window.addEventListener('click', function() {
            if (objecteEnfocat) mourePeça(objecteEnfocat);
        });

        document.addEventListener('keydown', function(e) {
            if ((e.keyCode === 32 || e.keyCode === 13) && objecteEnfocat) mourePeça(objecteEnfocat);
        });
    </script>
</body>
</html>
